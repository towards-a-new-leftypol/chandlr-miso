<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>navbar and breadcrumbs</title>
  <link href="navbar_breadcrumbs.css" rel="stylesheet" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <div class="navbar">
    <div class="menu_button"></div>
    <div class="breadcrumbs">
      <div class="breadcrumb breadcrumb--clickable">
        <span>Leftychan</span>
        <svg class="breadcrumb--chevron-svg-forward"><use href="#chevron-right-forward"></use></svg>
      </div>
      <div class="breadcrumb breadcrumb--clickable">
        <svg class="breadcrumb--chevron-svg-aft"><use href="#chevron-right-aft"></use></svg>
        <span>/b/, and 5 other boards</span>
        <svg class="breadcrumb--chevron-svg-forward"><use href="#chevron-right-forward"></use></svg>
      </div>
      <div class="breadcrumb">
        <svg class="breadcrumb--chevron-svg-aft"><use href="#chevron-right-aft"></use></svg>
        <span>13337.html</span>
      </div>
    </div>
  </div>

  <section style="display: none;">
    <svg id="chevron-right-forward" viewBox="0 0 100 100" preserveAspectRatio="none">
      <!-- <path -->
      <!--   d="M 0 5 L 5 5 L 90 50 L 5 90 L 0 90" -->
      <!--   vector-effect="non-scaling-stroke" -->
      <!--   stroke-linejoin="miter" -->
      <!--   /> -->
      <path
        d="M 0 8 L 15 8 L 92 50 L 15 92 L 0 92"
        vector-effect="non-scaling-stroke"
        stroke-linejoin="miter"
      />
      <!-- <path d="M 0 0 L 100 50 L 0 100 L 12 100 L 88 50 L 12 0 Z" /> -->
    </svg>
    <svg id="chevron-right-aft" viewBox="0 0 100 100" preserveAspectRatio="none">
      <path
        d="M 25 8 L 15 8 L 92 50 L 15 92 L 25 92"
        vector-effect="non-scaling-stroke"
        stroke-linejoin="miter"
      />
      <!-- d="M 15 8 L 92 50 L 15 92" -->
    </svg>
  </section> 
</body>
</html>
