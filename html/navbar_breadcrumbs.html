<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>navbar and breadcrumbs</title>
  <link href="navbar_breadcrumbs.css" rel="stylesheet" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <div class="navbar">
    <div class="menu_button">
      <div class="menu_button--burger-icon"></div>
    </div>
    <div class="breadcrumbs--wrapper">
      <div class="breadcrumbs">
        <div class="breadcrumb breadcrumb--clickable">
          <span>Leftychan</span>
          <svg class="breadcrumb--chevron-svg-forward"><use href="#svg-chevron-right-forward"></use></svg>
          <div class="breadcrumb--dots">
            <svg class="breadcrumb--dots-dot"><use href="#svg-dot"></use></svg>
            <svg class="breadcrumb--dots-dot"><use href="#svg-dot"></use></svg>
            <svg class="breadcrumb--dots-dot"><use href="#svg-dot"></use></svg>
          </div>
        </div>
        <div class="breadcrumb breadcrumb--clickable">
          <svg class="breadcrumb--chevron-svg-aft"><use href="#svg-chevron-right-aft"></use></svg>
          <span>/b/, and 5 other boards</span>
          <svg class="breadcrumb--chevron-svg-forward"><use href="#svg-chevron-right-forward"></use></svg>
          <div class="breadcrumb--dots">
            <svg class="breadcrumb--dots-dot"><use href="#svg-dot"></use></svg>
            <svg class="breadcrumb--dots-dot"><use href="#svg-dot"></use></svg>
            <svg class="breadcrumb--dots-dot"><use href="#svg-dot"></use></svg>
          </div>
        </div>
        <div class="breadcrumb">
          <svg class="breadcrumb--chevron-svg-aft"><use href="#svg-chevron-right-aft"></use></svg>
          <span>13337.html</span>
        </div>
      </div>
    </div>
  </div>

  <section style="display: none;">
    <svg id="svg-chevron-right-forward" viewBox="0 0 100 100" preserveAspectRatio="none">
      <path
        d="M 0 8 L 15 8 L 92 50 L 15 92 L 0 92"
        vector-effect="non-scaling-stroke"
        stroke-linejoin="miter"
      />
    </svg>
    <svg id="svg-chevron-right-aft" viewBox="0 0 100 100" preserveAspectRatio="none">
      <path
        d="M 25 8 L 15 8 L 92 50 L 15 92 L 25 92"
        vector-effect="non-scaling-stroke"
        stroke-linejoin="miter"
      />
    </svg>
    <svg id="svg-dot" viewBox="0 0 10 10">
      <path
        d="M 5 5 h0"
        vector-effect="non-scaling-stroke"
        stroke-linecap="round"
      />
    </svg>
  </section> 
</body>
</html>
